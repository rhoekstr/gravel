name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # C++ tests on Linux and macOS
  # ============================================================
  cpp-tests:
    name: C++ tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build-type: [Release]
        include:
          - os: ubuntu-latest
            install-cmd: sudo apt-get update && sudo apt-get install -y libosmium2-dev libeigen3-dev nlohmann-json3-dev
            osm-flag: "-DGRAVEL_USE_OSMIUM=ON"
          - os: macos-latest
            install-cmd: brew install libosmium protozero eigen nlohmann-json
            osm-flag: "-DGRAVEL_USE_OSMIUM=ON"
          - os: windows-latest
            # Windows uses vcpkg to pre-install Eigen + nlohmann-json +
            # Catch2 so CMake's find_package succeeds (via our
            # FIND_PACKAGE_ARGS on each FetchContent_Declare). Without
            # this, FetchContent's git-clone of Eigen systemically
            # hangs on GHA windows-latest runners.
            # No system libosmium on Windows — exercise core lib only.
            install-cmd: "vcpkg install eigen3 nlohmann-json catch2"
            osm-flag: "-DGRAVEL_USE_OSMIUM=OFF"

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: ${{ matrix.install-cmd }}

      - name: Configure CMake (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DGRAVEL_BUILD_TESTS=ON \
            ${{ matrix.osm-flag }}

      - name: Configure CMake (Windows, with vcpkg toolchain)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
            -DGRAVEL_BUILD_TESTS=ON \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            ${{ matrix.osm-flag }}

      - name: Build
        run: cmake --build build -j --config ${{ matrix.build-type }}

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -E "Real OSM|timing|perf" -C ${{ matrix.build-type }}

  # ============================================================
  # Python package build + smoke test
  # ============================================================
  python-tests:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e . -v

      - name: Import smoke test
        run: |
          python -c "import gravel; print('v' + gravel.__version__)"
          python -c "import gravel; g = gravel.make_grid_graph(10, 10); ch = gravel.build_ch(g); print(f'{g.node_count} nodes, CH built')"

      - name: Run Python tests
        if: hashFiles('python/tests/**') != ''
        run: |
          pip install pytest
          pytest python/tests/

  # ============================================================
  # Lint
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Check Python formatting
        run: ruff check python/ scripts/
