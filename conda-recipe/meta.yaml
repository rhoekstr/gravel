{% set name = "gravel-routing" %}
{% set version = "2.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # For conda-forge submission: use a GitHub release tarball
  url: https://github.com/rhoekstr/gravel/archive/refs/tags/v{{ version }}.tar.gz
  sha256: PLACEHOLDER_SHA256_OF_RELEASE_TARBALL
  # Alternatively, for local testing:
  # path: ..

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  skip: true  # [py<310]

requirements:
  build:
    - {{ compiler('cxx') }}
    - cmake >=3.20
    - ninja
    - make  # [unix]

  host:
    - python
    - pip
    - scikit-build-core >=0.8
    - pybind11 >=2.11
    - eigen
    - nlohmann_json
    - libosmium >=2.23
    - zlib
    - bzip2
    - expat
    - lz4-c

  run:
    - python
    - numpy

test:
  imports:
    - gravel
  commands:
    - python -c "import gravel; print(gravel.__version__)"
    - python -c "import gravel; g = gravel.make_grid_graph(10, 10); print(g.node_count)"

about:
  home: https://github.com/rhoekstr/gravel
  summary: Fast road network fragility analysis with contraction hierarchies
  description: |
    Gravel is a C++ library (with Python bindings) for computing how vulnerable
    road networks are to edge failures. Given a graph, it answers questions
    like "how isolated does this location become when 10% of its roads fail?"
    or "which counties are most dependent on a single critical route?"

    Built around contraction hierarchies for fast shortest-path queries and
    a Dijkstra + incremental SSSP pipeline for edge-removal analysis. On a
    200K-node county graph, it computes isolation fragility in ~2 seconds.
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  doc_url: https://rhoekstr.github.io/gravel/
  dev_url: https://github.com/rhoekstr/gravel

extra:
  recipe-maintainers:
    - rhoekstr
